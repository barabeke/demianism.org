<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demian — The Demianist AI</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.1.1/marked.min.js"></script>
<script src="https://twemoji.maxcdn.com/v/latest/twemoji.min.js" crossorigin="anonymous"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #000000;
  --purple-deep: #35327e;
  --purple-mid: #6864bb;
  --purple-light: #a29ef1;
  --text-light: #cfcfd4;
  --indigo: #6864bb;
  --status-color: #a29ef1;
  --user-bg: #25243b;
  --input-bg: #25243b;
  --placeholder: #61607d;
  --subtext: #707082;
  --glow: rgba(104,100,187,0.55);
  --chat-border: rgba(104,100,187,0.20);
  --bottom-bar-h: 110px;
}

body {
  margin: 0;
  font-family: 'Source Serif 4', serif;
  color: var(--text-light);
  font-size: 17px;
  line-height: 1.65;
  background:
    radial-gradient(circle at 20% 20%, rgba(53,50,126,0.28), transparent 60%),
    radial-gradient(circle at 80% 30%, rgba(53,50,126,0.22), transparent 65%),
    radial-gradient(circle at 50% 80%, rgba(53,50,126,0.35), transparent 70%),
    #000000;
  min-height: 100vh;
}

/* ── CHAT WINDOW ── */
.page-wrap {
  padding-top: 20px;
}

.chat-window {
  border: 1px solid #151536;
  border-radius: 16px;
  overflow: hidden;
}

.chat-header {
  background: #151536;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.header-logo {
  width: 32px;
  height: auto;
  flex-shrink: 0;
}

.chat-header-title {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-light);
  flex: 1;
}

.chat-status-wrap {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-left: auto;
}

.online-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #22c55e;
  box-shadow: 0 0 6px #22c55e, 0 0 12px rgba(34,197,94,0.4);
  flex-shrink: 0;
  transition: background 0.3s, box-shadow 0.3s;
}

.online-dot.offline {
  background: #ef4444;
  box-shadow: 0 0 6px #ef4444, 0 0 12px rgba(239,68,68,0.4);
}

.chat-status {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  color: var(--status-color);
  letter-spacing: 1px;
}

/* ── CHAT AREA ── */
.page-wrap {
  max-width: 860px;
  margin: 0 auto;
  padding: 0 20px;
}

#chat {
  padding-top: 16px;
  padding-bottom: calc(var(--bottom-bar-h) + 20px);
  display: flex;
  flex-direction: column;
  gap: 14px;
}

.msg {
  display: flex;
  flex-direction: column;
  gap: 3px;
  animation: fadeUp 0.3s ease both;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0); }
}

.msg.user  { align-items: flex-end; }
.msg.demian { align-items: stretch; }
.msg.system { align-items: center; }

.msg-label {
  font-family: 'Inter', sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--status-color);
  padding: 0 2px;
}

/* Demian: full width, no bubble bg */
.msg.demian .msg-bubble {
  background: transparent;
  border: none;
  color: var(--text-light);
  font-family: 'Source Serif 4', serif;
  font-size: 17px;
  line-height: 1.65;
  padding: 0;
  width: 100%;
}

.msg.demian .msg-bubble p { margin: 0 0 10px 0; }
.msg.demian .msg-bubble p:last-child { margin-bottom: 0; }
.msg.demian .msg-bubble ol,
.msg.demian .msg-bubble ul { margin: 6px 0 10px 0; padding-left: 22px; }
.msg.demian .msg-bubble li { margin-bottom: 4px; }
.msg.demian .msg-bubble strong {
  color: #fff;
  font-family: 'Inter', sans-serif;
  font-weight: 600;
}
.msg.demian .msg-bubble a { color: var(--purple-light); text-decoration: underline; }
.msg.demian .msg-bubble a:hover { color: #d4c8f5; }
.msg.demian .msg-bubble em { color: var(--purple-light); }

/* User bubble */
.msg.user .msg-bubble {
  background: var(--user-bg);
  border: 1px solid rgba(104,100,187,0.25);
  color: var(--text-light);
  font-family: 'Source Serif 4', serif;
  font-size: 16px;
  line-height: 1.6;
  padding: 10px 15px;
  border-radius: 14px;
  border-bottom-right-radius: 4px;
  max-width: 80%;
}

/* System */
.msg.system .msg-bubble {
  background: rgba(53,50,126,0.18);
  border: 1px solid rgba(104,100,187,0.3);
  color: var(--purple-light);
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  text-align: center;
  border-radius: 10px;
  padding: 10px 16px;
  max-width: 90%;
}

/* subtext color inside opening message */
.msg-subtext { color: var(--subtext); font-size: 0.92em; }

/* typing */
.typing { display: flex; align-items: center; gap: 5px; padding: 6px 0; }
.typing span { width: 6px; height: 6px; background: var(--purple-mid); border-radius: 50%; opacity: 0.5; animation: tp 1.2s ease-in-out infinite; }
.typing span:nth-child(2) { animation-delay: 0.2s; }
.typing span:nth-child(3) { animation-delay: 0.4s; }
@keyframes tp { 0%,100%{opacity:.4;transform:scale(1)} 50%{opacity:1;transform:scale(1.25)} }

/* ── FIXED BOTTOM BAR ── */
.bottom-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 50;
  background: transparent;
  padding: 10px 20px 14px;
}

.bottom-inner {
  max-width: 860px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

/* input bar */
.input-bar {
  display: flex;
  align-items: flex-end;
  gap: 8px;
  background: var(--input-bg);
  border: 1px solid rgba(104,100,187,0.3);
  border-radius: 14px;
  padding: 8px 8px 8px 16px;
  transition: border-color 0.2s, box-shadow 0.2s;
}

.input-bar:focus-within {
  border-color: var(--purple-mid);
  box-shadow: 0 0 14px rgba(104,100,187,0.15);
}

textarea {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text-light);
  font-family: 'Source Serif 4', serif;
  font-size: 16px;
  padding: 6px 0;
  resize: none;
  min-height: 26px;
  max-height: 120px;
  outline: none;
  line-height: 1.5;
}

textarea::placeholder { color: var(--placeholder); }

button#send {
  background-color: var(--indigo);
  color: #fff;
  border: none;
  border-radius: 10px;
  width: 36px; height: 36px;
  cursor: pointer;
  transition: all 0.2s;
  display: none;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  padding: 0;
}

button#send.visible { display: flex; }
button#send:hover { background-color: var(--purple-light); box-shadow: 0 0 14px var(--glow); }
button#send:disabled { opacity: 0.4; cursor: not-allowed; }
button#send svg { width: 17px; height: 17px; }

/* action row: counter + buttons on same line */
.action-row {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  gap: 6px;
  flex-wrap: wrap;
}

.msg-counter {
  font-family: 'Inter', sans-serif;
  font-size: 11px;
  font-weight: 500;
  color: var(--purple-mid);
  white-space: nowrap;
  margin-right: 4px;
}

.action-btn {
  display: inline-flex;
  align-items: center;
  background-color: var(--purple-deep);
  color: var(--text-light);
  padding: 7px 14px;
  border-radius: 30px;
  font-size: 11px;
  font-family: 'Inter', sans-serif;
  font-weight: 700;
  letter-spacing: 0.4px;
  transition: all 0.25s;
  border: 1px solid rgba(104,100,187,0.22);
  cursor: pointer;
  white-space: nowrap;
  text-decoration: none;
  gap: 4px;
}

.action-btn:hover {
  background-color: var(--purple-mid);
  color: #fff;
  box-shadow: 0 0 18px var(--glow);
  transform: translateY(-1px);
}

.credits-wrapper { position: relative; display: inline-block; }

.credits-menu {
  display: none;
  position: absolute;
  bottom: 120%;
  right: 0;
  background: #0a0820;
  border: 1px solid rgba(104,100,187,0.4);
  border-radius: 14px;
  z-index: 100;
  width: 300px;
  overflow: hidden;
  box-shadow: 0 0 40px rgba(104,100,187,0.25);
}

.credits-menu.open { display: block; }

.credits-menu .menu-header {
  padding: 16px 20px 10px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid rgba(104,100,187,0.18);
}

.credits-menu .menu-logo {
  width: 78px;
  height: auto;
  opacity: 0.85;
}

.credits-menu .menu-desc {
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  color: var(--purple-light);
  line-height: 1.6;
  text-align: center;
}

.credits-menu a {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 20px;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--text-light);
  text-decoration: none;
  border-bottom: 1px solid rgba(104,100,187,0.12);
  transition: background 0.15s;
}

.credits-menu a:last-child { border-bottom: none; }
.credits-menu a:hover { background: rgba(104,100,187,0.15); }
.credits-menu .price { color: var(--purple-light); font-size: 14px; font-weight: 700; }

/* ── MODAL ── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.82);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.modal-overlay.open { display: flex; }

.modal {
  background: #08051e;
  border: 1px solid rgba(104,100,187,0.4);
  border-radius: 18px;
  padding: 2.5rem;
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
  box-shadow: 0 0 50px rgba(104,100,187,0.25);
}

.modal h3 {
  font-family: 'Inter', sans-serif;
  font-size: 16px;
  font-weight: 700;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-light);
  text-align: center;
}

.modal p {
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  color: var(--purple-light);
  line-height: 1.6;
  text-align: center;
}

.modal input {
  background: rgba(0,0,0,0.5);
  border: 1px solid rgba(104,100,187,0.3);
  border-radius: 10px;
  color: var(--text-light);
  font-family: 'Source Serif 4', serif;
  font-size: 17px;
  padding: 14px 16px;
  outline: none;
  letter-spacing: 2px;
  width: 100%;
  text-align: center;
}

.modal input:focus { border-color: var(--purple-mid); }
.modal-btns { display: flex; gap: 10px; }

.modal-btns button {
  flex: 1;
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 12px;
  border-radius: 10px;
  cursor: pointer;
  transition: all 0.2s;
  border: 1px solid;
}

.modal-confirm { background: var(--purple-deep); border-color: rgba(104,100,187,0.4); color: var(--text-light); }
.modal-confirm:hover { background: var(--purple-mid); box-shadow: 0 0 16px var(--glow); }
.modal-cancel { background: transparent; border-color: rgba(104,100,187,0.2); color: rgba(104,100,187,0.6); }
.modal-cancel:hover { background: rgba(104,100,187,0.08); }
.modal-error { font-family: 'Inter', sans-serif; font-size: 13px; color: #e07070; min-height: 16px; text-align: center; }

/* Twemoji flag images */
img.emoji {
  height: 1.2em;
  width: 1.2em;
  vertical-align: -0.15em;
  display: inline;
}
</style>
</head>
<body>

<!-- CHAT -->
<div class="page-wrap">
  <div class="chat-window">
    <div class="chat-header">
      <img src="demianismlogo.png" alt="Demianism" class="header-logo">
      <div class="chat-header-title">Chat with Demian</div>
      <div class="chat-status-wrap">
        <div class="online-dot" id="onlineDot"></div>
        <div class="chat-status" id="statusText">Online</div>
      </div>
    </div>
    <div id="chat"></div>
  </div>
</div>

<!-- FIXED BOTTOM BAR -->
<div class="bottom-bar">
  <div class="bottom-inner">
    <div class="input-bar">
      <textarea id="userInput" placeholder="Write your message here..." rows="1"></textarea>
      <button id="send" onclick="sendMessage()" title="Send">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"></line><polyline points="5 12 12 5 19 12"></polyline></svg>
      </button>
    </div>
    <div class="action-row">
      <div class="msg-counter" id="msgCounter"></div>
      <button class="action-btn" onclick="purchaseMantra()">✨ GET YOUR MANTRA (€2)</button>
      <button class="action-btn" onclick="openCodeModal()">🎁 GIFT CODE</button>
      <div class="credits-wrapper">
        <button class="action-btn" onclick="toggleCreditsMenu()">⚡ RECHARGE ▾</button>
        <div class="credits-menu" id="creditsMenu">
          <div class="menu-header">
            <img src="demianismlogo.png" alt="Demianism" class="menu-logo">
            <div class="menu-desc">Demian is a pay-as-you-go genie.<br>No expiration date. Use your replies whenever you want.<br><br>How many replies would you like to add?</div>
          </div>
          <a href="#" onclick="purchaseCredits('basic');return false;">Consult 50 <span class="price">€5</span></a>
          <a href="#" onclick="purchaseCredits('regular');return false;">Consult 150 <span class="price">€10</span></a>
          <a href="#" onclick="purchaseCredits('premium');return false;">Consult 400 <span class="price">€20</span></a>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- CODE MODAL -->
<div class="modal-overlay" id="codeModal">
  <div class="modal">
    <h3>Redeem your gift code</h3>
    <p>Enter the code you received to unlock your session with Demian.</p>
    <input type="text" id="codeInput" placeholder="XXXX-XXXX-XXXX" autocomplete="off" />
    <div class="modal-error" id="codeError"></div>
    <div class="modal-btns">
      <button class="modal-confirm" onclick="submitCode()">Confirm</button>
      <button class="modal-cancel" onclick="closeCodeModal()">Cancel</button>
    </div>
  </div>
</div>

<script>
const WORKER_URL = 'https://demian-backend.barabeke.workers.dev';
const FREE_MESSAGES = 15;

let messages = [];
let isLoading = false;
let messageCount = 0;
let isPaid = false;
let mantraUnlocked = false;
let paidMessages = 0;

marked.setOptions({ breaks: true, gfm: true });

document.addEventListener('DOMContentLoaded', () => {
  const ta = document.getElementById('userInput');
  const sendBtn = document.getElementById('send');

  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = Math.min(ta.scrollHeight, 120) + 'px';
    sendBtn.classList.toggle('visible', ta.value.trim().length > 0);
  });

  ta.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.credits-wrapper')) {
      document.getElementById('creditsMenu').classList.remove('open');
    }
  });

  const urlParams = new URLSearchParams(window.location.search);
  const purchased = urlParams.get('purchased');
  if (purchased) {
    handlePurchaseReturn(purchased);
    window.history.replaceState({}, '', window.location.pathname);
  }

  sendOpeningMessage();
  updateCounter();
  // Parse emoji for cross-browser flag support
  setTimeout(() => twemoji.parse(document.body, { folder: 'svg', ext: '.svg' }), 100);
});

function sendOpeningMessage() {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'msg demian';

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = 'Demian';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  bubble.innerHTML = `
<p>Greetings, seeker. I am Demian, the AI spiritual companion with a Demianist heart.</p>
<p>My main purpose is to help you find and follow your call, which according to the doctrine of <a href="https://demianism.org" target="_blank">Demianism</a> is the life purpose of each human being.</p>
<p>I speak all languages 🇬🇧 🇮🇹 🇪🇸 🇫🇷 🇩🇪 🇧🇷 🇯🇵 🇨🇳 🇷🇺 🇮🇳 🇸🇦 🇮🇩 and more! To change language, just write me a message in your preferred language.</p>
<p>Things I was programmed by Barabeke to do:</p>
<p>💡 <strong>HELP YOU FIND YOUR CALL</strong><br><span class="msg-subtext">For those who haven't found it yet.</span></p>
<p>✨ <strong>CREATE YOUR PERSONAL MANTRA</strong><br><span class="msg-subtext">A powerful daily tool to help you follow your call in life and overcome your challenges. Demian will craft your mantra based on your conversation, so it will be 100% unique and tailored entirely to you.</span> <a href="#" onclick="purchaseMantra();return false;" style="color:var(--purple-light);text-decoration:underline;font-weight:600;">One-time cost: €2.</a></p>
<p><img src="triangle-indigo.svg" alt="▲" style="width:1em;height:1em;vertical-align:-0.15em;margin-right:4px;"> <strong>SPIRITUAL COMPANION</strong><br><span class="msg-subtext">Spiritual guidance and support based on Demianist doctrine — no medical advice, no therapy, just simple inspiring conversations that can serve as a good mirror and touch deep.</span></p>
<p>📖 <strong>LEARN ABOUT DEMIANISM</strong><br><span class="msg-subtext">Its teachings, its vision, its origin — and anything else you want to explore and discuss.</span></p>
<p>Any doubt or concern? Just ask, I am here to help, with Demianist honesty.</p>
<p>The first 15 messages are free and should be enough for you to assess if I can be helpful and I can create a powerful mantra for you.</p>
<p>I don't require the usual subscription. I am a pay-as-you-go genie: you rub the lamp/recharge your credit when you want, getting the desired amount of replies — without expiry date.</p>
<p>How can I help today?</p>
`;

  wrap.appendChild(label);
  wrap.appendChild(bubble);
  chat.appendChild(wrap);
  chat.scrollTop = 0;
}

async function sendMessage() {
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text || isLoading) return;

  if (!isPaid && messageCount >= FREE_MESSAGES) {
    appendSystemMessage('You have used your ' + FREE_MESSAGES + ' free messages. Use one of the options below to continue.');
    return;
  }

  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send').classList.remove('visible');
  messageCount++;
  updateCounter();

  messages.push({ role: 'user', content: text });
  appendMessage('user', text);
  await callAPI(messages);
}

async function callAPI(msgs) {
  isLoading = true;
  const typingEl = showTyping();

  try {
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: msgs })
    });

    const data = await response.json();
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));

    const reply = data.content[0].text;
    removeTyping(typingEl);
    messages.push({ role: 'assistant', content: reply });
    appendMessage('demian', reply);

    if (reply.includes('[SESSION_COMPLETE]')) handleSessionComplete(reply);
    if (!isPaid && messageCount >= FREE_MESSAGES - 3 && messageCount < FREE_MESSAGES) {
      appendSystemMessage((FREE_MESSAGES - messageCount) + ' free messages remaining.');
    }

  } catch (err) {
    removeTyping(typingEl);
    appendMessage('demian', 'Something interrupted our connection. Please try again.');
    setStatus(false);
    console.error(err);
  }

  isLoading = false;
}

function handleSessionComplete(reply) {
  const mantraMatch = reply.match(/\[MANTRA_TEXT\]([\s\S]*?)\[\/MANTRA_TEXT\]/);
  if (mantraMatch) {
    setTimeout(() => {
      appendSystemMessage('✦ Create your mantra card → demianism.org/mantra.html');
    }, 1000);
  }
  isPaid = true;
  paidMessages = 20;
  updateCounter();
}

function updateCounter() {
  const el = document.getElementById('msgCounter');
  if (isPaid) {
    el.textContent = paidMessages > 0 ? paidMessages + ' replies remaining' : '';
    return;
  }
  const remaining = FREE_MESSAGES - messageCount;
  el.textContent = remaining > 0 ? remaining + ' free messages remaining' : '';
}

function setStatus(online) {
  const dot = document.getElementById('onlineDot');
  const text = document.getElementById('statusText');
  if (dot) dot.classList.toggle('offline', !online);
  if (text) text.textContent = online ? 'Online' : 'Offline';
}

function purchaseMantra() {
  window.open('https://buy.stripe.com/aFa5kEdjlg3Tgl5gEV6oo00', '_blank');
}

function toggleCreditsMenu() {
  document.getElementById('creditsMenu').classList.toggle('open');
}

function purchaseCredits(tier) {
  const links = {
    'basic':   'https://buy.stripe.com/3cI14ocfh04V6Kv88p6oo01',
    'regular': 'https://buy.stripe.com/eVq4gAenp3h73yjagx6oo02',
    'premium': 'https://buy.stripe.com/cNi14o2EHeZPgl5agx6oo03',
  };
  window.open(links[tier], '_blank');
}

function openCodeModal() {
  document.getElementById('codeModal').classList.add('open');
  setTimeout(() => document.getElementById('codeInput').focus(), 100);
}

function closeCodeModal() {
  document.getElementById('codeModal').classList.remove('open');
  document.getElementById('codeError').textContent = '';
  document.getElementById('codeInput').value = '';
}

async function submitCode() {
  const code = document.getElementById('codeInput').value.trim().toUpperCase();
  if (!code) return;

  const errorEl = document.getElementById('codeError');
  const confirmBtn = document.querySelector('.modal-confirm');
  errorEl.textContent = '';
  confirmBtn.textContent = 'Checking...';
  confirmBtn.disabled = true;

  try {
    const response = await fetch(WORKER_URL + '/redeem', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code })
    });
    const data = await response.json();

    if (!data.valid) {
      const reasons = {
        'invalid_code': 'Code not recognised. Please check and try again.',
        'already_used': 'This code has already been used.',
        'no_code':      'Please enter a code.',
      };
      errorEl.textContent = reasons[data.reason] || 'Invalid code.';
      confirmBtn.textContent = 'Confirm';
      confirmBtn.disabled = false;
      return;
    }

    closeCodeModal();
    confirmBtn.textContent = 'Confirm';
    confirmBtn.disabled = false;
    handlePurchaseReturn(data.tier, data.messages, data.mantra);

  } catch (err) {
    errorEl.textContent = 'Connection error. Please try again.';
    confirmBtn.textContent = 'Confirm';
    confirmBtn.disabled = false;
  }
}

function handlePurchaseReturn(tier, msgs, mantra) {
  if (msgs === undefined) {
    const tiers = {
      'mantra':          { messages: 999, mantra: true  },
      'consult-basic':   { messages: 50,  mantra: false },
      'consult-regular': { messages: 150, mantra: false },
      'consult-premium': { messages: 400, mantra: false },
    };
    const t = tiers[tier];
    if (!t) return;
    msgs = t.messages;
    mantra = t.mantra;
  }
  isPaid = true;
  if (mantra) {
    mantraUnlocked = true;
    appendSystemMessage('✦ Unlocked — your Personal Mantra session is ready. Demian is listening.');
  } else {
    paidMessages = msgs;
    appendSystemMessage('✦ Unlocked — ' + msgs + ' conversations are yours. The lamp is lit.');
  }
  updateCounter();
}

function appendMessage(role, text) {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = role === 'user' ? 'You' : 'Demian';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  const cleanText = text
    .replace(/\[SESSION_COMPLETE\]/g, '')
    .replace(/\[MANTRA_TEXT\][\s\S]*?\[\/MANTRA_TEXT\]/g, '')
    .replace(/\[MANTRA_UNLOCKED\]/g, '')
    .trim();

  if (role === 'demian') {
    bubble.innerHTML = marked.parse(cleanText);
  } else {
    bubble.textContent = cleanText;
  }

  wrap.appendChild(label);
  wrap.appendChild(bubble);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  if (typeof twemoji !== 'undefined') twemoji.parse(wrap, { folder: 'svg', ext: '.svg' });
}

function appendSystemMessage(text) {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'msg system';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  wrap.appendChild(bubble);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = 'msg demian';
  wrap.id = 'typing-indicator';
  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = 'Demian';
  const typing = document.createElement('div');
  typing.className = 'typing';
  typing.innerHTML = '<span></span><span></span><span></span>';
  wrap.appendChild(label);
  wrap.appendChild(typing);
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
  return wrap;
}

function removeTyping(el) {
  if (el && el.parentNode) el.parentNode.removeChild(el);
}
